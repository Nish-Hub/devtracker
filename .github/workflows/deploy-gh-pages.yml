name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare site
        run: |
          mkdir site
          # Copy only the public site files (avoid dist artifacts and node_modules)
          rsync -a --delete index.html css js docs site/ || true
          # Inject cache-busting query param into the script tag so browsers fetch updated JS
          sed -i "s|<script type=\"module\" src=\"js/app.js\"></script>|<script type=\"module\" src=\"js/app.js?v=${{ github.sha }}\"></script>|g" site/index.html || true

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          token: ${{ secrets.GITHUB_TOKEN }}
